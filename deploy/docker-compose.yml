# =============================================================================
# VibeXLearn Platform - Development Docker Compose
# =============================================================================
# Kullanım:
#   docker-compose up -d              # Sadece altyapı servisleri
#   docker-compose up -d --build      # API ile birlikte
# =============================================================================

name: vibexlearn-dev

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PostgreSQL 17
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:18-alpine
    container_name: vibexlearn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibexlearn}
      POSTGRES_USER: ${POSTGRES_USER:-vibex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibex_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibex_user} -d ${POSTGRES_DB:-vibexlearn}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vibexlearn-net

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis 7
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:8-alpine
    container_name: vibexlearn-redis
    restart: unless-stopped
    command: >
      redis-server
      /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibexlearn-net

  # ═══════════════════════════════════════════════════════════════════════════
  # Elasticsearch 9.3.1
  # ═══════════════════════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: vibexlearn-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
      - ./configs/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: >
        curl -s -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health
        | grep -qE '"status":"(green|yellow)"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vibexlearn-net
    ulimits:
      memlock:
        soft: -1
        hard: -1

  # ═══════════════════════════════════════════════════════════════════════════
  # Kibana 9.3.1
  # ═══════════════════════════════════════════════════════════════════════════
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: vibexlearn-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - ./configs/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      - vibexlearn-net

  # ═══════════════════════════════════════════════════════════════════════════
  # API (Development - opsiyonel)
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ../
      dockerfile: src/Presentation/Platform.WebAPI/Dockerfile
    container_name: vibexlearn-api
    restart: unless-stopped
    profiles:
      - api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-vibexlearn};Username=${POSTGRES_USER:-vibex_user};Password=${POSTGRES_PASSWORD:-vibex_password};Pooling=true;MinPoolSize=5;MaxPoolSize=100;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redis_password},abortConnect=false"
      ConnectionStrings__Elasticsearch: "http://elasticsearch:9200"
      Elastic__Username: ${ELASTICSEARCH_USERNAME}
      Elastic__Password: ${ELASTICSEARCH_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:-development_secret_key_min_32_characters}
      Jwt__Issuer: ${JWT_ISSUER:-VibeXLearnPlatform}
      Jwt__Audience: ${JWT_AUDIENCE:-VibeXLearnPlatform.Clients}
      Iyzico__ApiKey: ${IYZICO_API_KEY:-sandbox-api-key}
      Iyzico__SecretKey: ${IYZICO_SECRET_KEY:-sandbox-secret-key}
      Iyzico__BaseUrl: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      Iyzico__CallbackUrl: ${IYZICO_CALLBACK_URL:-https://localhost:8443/api/payments/callback}
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - vibexlearn-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elastic_data:
    driver: local

networks:
  vibexlearn-net:
    driver: bridge

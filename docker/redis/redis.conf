# Temel güvenlik
# Not: requirepass, docker-compose command satırındaki --requirepass ile set edilir.
# Redis config dosyası env var interpolation yapmaz; bu satır dummy placeholder.
requirepass placeholder_overridden_by_cli

# Bellek yönetimi
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (cache-only senaryoda kapatılabilir)
save 900 1
save 300 10
save 60  10000
appendonly yes
appendfsync everysec

# Bağlantı
tcp-keepalive 300
timeout 0
